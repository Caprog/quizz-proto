<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Proto</title>
  <link rel="stylesheet" href="./style.css">  
</head>

<body>
  <!-- aspect ratio 16/9 -->
  <div id="app" class="container" style="user-select: none;">
    
    <div class="crt-screen child-layer"></div>

    <div class="world child-layer">
      <!-- Solo hay una escalera y 11 escalones, los escalones mas bajos toman el ancho de 80% del contenedor y va bajando el ancho a medida que el escalon esta mas arriba -->
      <div class="stairs">
        <div class="stair" data-score="10"><div class="visual"></div></div>
        <div class="stair" data-score="9"><div class="visual"></div></div>
        <div class="stair" data-score="8"><div class="visual"></div></div>
        <div class="stair" data-score="7"><div class="visual"></div></div>
        <div class="stair" data-score="6"><div class="visual"></div></div>
        <div class="stair" data-score="5"><div class="visual"></div></div>
        <div class="stair" data-score="4"><div class="visual"></div></div>
        <div class="stair" data-score="3"><div class="visual"></div></div>
        <div class="stair" data-score="2"><div class="visual"></div></div>
        <div class="stair" data-score="1"><div class="visual"></div></div>
        <div class="stair" data-score="0"><div class="visual"></div></div>
      </div>

      <div id="spawn" class="spawn"></div>
    </div>

    <div class="ui child-layer">
      <div id="global_countdown_bar"
         style="width: 100%; height: 0.5cqw; background-color: rgb(57, 57, 57); transition: width 0.1s linear;">
      </div>
      <div id="score" class="score">
        <p>0 pts</p>
      </div>
      <div id="question_number" class="question-number">
        <p></p>
      </div>
      <div id="top_x" class="top-x"></div>
      <div id="players_count" class="players-count">
        <p>0 Players</p>
      </div>
      <p id="message" class="style-retro hidden"></p>

      `
      <div id="modal-quiz" class="modal-quiz hidden">
        <h1 id="question" class="title-quiz"></h1>
        <div id="quiz-options" class="quiz-options"></div>
        <div class="timer-container">
          <div id="question_countdown_bar" class="timer-bar"
            style="width: 100%; transition: width 0.1s linear;">
          </div>
        </div>
      </div>
    </div>
  
  </div>
  <script type="module" src="./client.js"></script>
</body>

</html>
