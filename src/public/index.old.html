<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Proto</title>
  <link rel="stylesheet" href="./style.css">  
</head>

<body>
  <!-- aspect ratio 16/9 -->
  <div id="app" class="container" style="user-select: none;">
    
    <div class="crt-screen child-layer"></div>

    <div class="world child-layer">
      <!-- Solo hay una escalera y 11 escalones, los escalones mas bajos toman el ancho de 80% del contenedor y va bajando el ancho a medida que el escalon esta mas arriba -->
      <div class="stairs">
        <div class="stair">10</div>
        <div class="stair">9</div>
        <div class="stair">8</div>
        <div class="stair">7</div>
        <div class="stair">6</div>
        <div class="stair">5</div>
        <div class="stair">4</div>
        <div class="stair">3</div>
        <div class="stair">2</div>
        <div class="stair">1</div>
        <div class="stair">0</div>
      </div>
      <div class="actors"></div>
    </div>

    <div class="ui child-layer"></div>
